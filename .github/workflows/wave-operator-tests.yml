name: WaveOperator Lab tests

on:
  push:
    paths:
      - "wave-operator-lab/**"
      - ".github/workflows/wave-operator-tests.yml"
  pull_request:
    paths:
      - "wave-operator-lab/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wave-operator-lab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CPU test dependencies
        run: pip install numpy torch --index-url https://download.pytorch.org/whl/cpu
      - name: Run tests
        run: python -m unittest discover -s tests -v
