services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_ops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_ops"]
      interval: 3s
      timeout: 3s
      retries: 15
    volumes:
      - finance_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://finance:finance@db:5432/finance_ops
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  finance_data:

